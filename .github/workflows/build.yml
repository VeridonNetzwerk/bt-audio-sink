name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Generate icon
      shell: powershell
      run: |
        if (Test-Path .\scripts\generate-icon.ps1) {
          .\scripts\generate-icon.ps1
        }
        else {
          Write-Host "Skipping icon generation: scripts/generate-icon.ps1 not found."
        }

    - name: Restore dependencies
      run: dotnet restore src/BtAudioSink/BtAudioSink.csproj

    - name: Build
      run: dotnet build src/BtAudioSink/BtAudioSink.csproj -c ${{ matrix.configuration }} -p:Platform=${{ matrix.platform }} --no-restore

    - name: Publish (self-contained)
      run: dotnet publish src/BtAudioSink/BtAudioSink.csproj -c ${{ matrix.configuration }} -r win-${{ matrix.platform }} --self-contained -o publish/${{ matrix.platform }}

    - name: Build MSI installer
      run: dotnet build installer/BtAudioSink.Installer.wixproj -c ${{ matrix.configuration }} -p:Platform=${{ matrix.platform }}

    - name: Upload portable artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BtAudioSink-Portable-${{ matrix.platform }}-${{ matrix.configuration }}
        path: publish/${{ matrix.platform }}/
        retention-days: 30

    - name: Upload MSI artifact
      uses: actions/upload-artifact@v4
      with:
        name: BtAudioSink-MSI-${{ matrix.platform }}-${{ matrix.configuration }}
        path: installer/bin/${{ matrix.platform }}/${{ matrix.configuration }}/BtAudioSink.Installer.msi
        retention-days: 30
